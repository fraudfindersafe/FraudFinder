<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Registro</title>
    <link rel="stylesheet" href="styles.css">
    <link href='https://fonts.googleapis.com/css?family=Poppins' rel='stylesheet'>
</head>
    <script>
function botao() {
alert("Olá! Você clicou no botão.");
}
</script>
<body>
    <div id="bloco-1">
        <img src="logo.png" alt="logo">
        <h1 id="e">Entrar</h1>
        <form action="" id="form-register">
        <label for="email"></label>
        <input type="email" name="email" class="email" placeholder="Email" required>
        <label for="senha"></label>
        <input type="password" name="senha" id="senha" placeholder="Senha" required>
        <input type="submit" value="Entrar" id="entrar" onclick="botao()">
        </form>
    </div>
    <div id="bloco-2">
        <h1 id="c">Cadastrar</h1>
        <ul>
            <li>Consulte o status de segurança dos números</li>
            <br>
            <li>Cadastre feedbacks sobre números suspeitos</li>
            <br>
            <li>Dentre outras verificações</li>
        </ul>
        <form action="" id="form-login">
        <label for="email"></label>
        <input type="email" name="email" class="email" placeholder="Email" required>
        <label for="senha"></label>
        <input type="password" name="senha" id="senha" placeholder="Senha" required>
        <input type="submit" value="Cadastrar" id="cadastrar">
        </form>
    </div>
</body>

</html>
